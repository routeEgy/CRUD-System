  <div class="container mt-5">
    <h2 class="text-left">CRUDS</h2>

    <!-- productName -->
    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="productName" placeholder="Oppo">
      <label for="productName">productName</label>
    </div>


    <!-- productPrice -->
    <div class="form-floating mb-3">
      <input type="number" class="form-control" id="productPrice" placeholder="3000">
      <label for="productPrice">productPrice</label>
    </div>


    <!-- productCategory -->
    <div class="form-floating mb-3">
      <input autocomplete="off" list="categoryList" type="text" class="form-control" id="productCategory"
        placeholder="Mobile">
      <label for="productCategory">productCategory</label>

      <!--  -->
      <datalist id="categoryList">
        <option value="Mobile" />
        <option value="Screens" />
        <option value="Latop" />
      </datalist>




    </div>



    <!-- Image -->
    <div class="my-2">
      <label for="productImage">Upload product image :-</label>
      <input id="productImage" type="file" class="form-control">
    </div>


    <!-- productDesc -->
    <div class="form-floating mb-3">
      <textarea class="form-control" id="productDesc" placeholder="Good"></textarea>
      <label for="productDesc">productDesc</label>
    </div>


    <button onclick="addProduct();" class="btn btn-outline-info ">Add Product</button>
  </div>


  <div class="container my-4">
    <div id="row" class="row g-4">
      
    </div>
  </div>
